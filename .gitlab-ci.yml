stages:
  - build
  - test
  - package

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches

before_script:
  - chmod +x gradlew || true

build:
  stage: build
  script:
    - ./gradlew clean compileKotlin
  artifacts:
    paths:
      - build/
    expire_in: 1 week

test:
  stage: test
  script:
    - ./gradlew test
  artifacts:
    when: always
    reports:
      junit: build/test-results/test/*.xml
    paths:
      - build/reports/tests/

package:
  stage: package
  script:
    - ./gradlew jar
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 week

run_app:
  stage: package
  script:
    - echo "ИванИванов|¬27|+7999000 1 1 11|example@@yandex..ru" > input.txt
    - java -jar build/libs/*.jar
    - cat output.txt
  artifacts:
    paths:
      - output.txt
    expire_in: 1 week
  only:
    - main
    - master
